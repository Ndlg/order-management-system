<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>订单整理系统 Web服务</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --line: #d9e2ec;
      --line-strong: #b8c7d8;
      --text: #182331;
      --muted: #66758a;
      --blue: #2563a8;
      --blue-dark: #174a7c;
      --green: #16805f;
      --red: #b42318;
      --amber: #9a6700;
      --shadow: 0 14px 34px rgba(24, 35, 49, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      font-size: 15px;
      letter-spacing: 0;
    }

    button, select, input { font: inherit; }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: #dbeafe;
      color: var(--blue-dark);
      display: grid;
      place-items: center;
      font-weight: 800;
      border: 1px solid #b7d4f5;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
      font-weight: 800;
    }

    .meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(320px, .8fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      font-size: 16px;
      font-weight: 800;
      margin: 0;
    }

    .panel-body { padding: 20px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 16px;
      min-height: 84px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 7px;
    }

    .stat .value {
      font-size: 24px;
      line-height: 1;
      font-weight: 800;
      color: var(--text);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field { min-width: 0; }

    .field.full { grid-column: 1 / -1; }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      color: #263548;
    }

    select {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    select:focus,
    .file-zone:focus-within {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 168, .14);
    }

    .file-input {
      width: 1px;
      height: 1px;
      opacity: 0;
      position: absolute;
      pointer-events: none;
    }

    .file-zone {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 88px;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      background: var(--surface-soft);
      padding: 16px;
      cursor: pointer;
    }

    .file-main {
      min-width: 0;
    }

    .file-title {
      font-weight: 800;
      margin-bottom: 5px;
    }

    .file-detail {
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }

    .mode-group {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .mode-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .mode-option span {
      display: grid;
      place-items: center;
      min-height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: #2b3b4f;
      font-weight: 700;
      cursor: pointer;
      padding: 0 10px;
      text-align: center;
    }

    .mode-option input:checked + span {
      border-color: var(--blue);
      color: #fff;
      background: var(--blue);
    }

    .btn {
      height: 42px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn.primary {
      background: var(--blue);
      color: #fff;
    }

    .btn.primary:hover { background: var(--blue-dark); }

    .btn.secondary {
      color: var(--blue-dark);
      background: #fff;
      border-color: var(--line-strong);
    }

    .btn.secondary:hover { background: #eef5ff; }

    .btn.success {
      background: var(--green);
      color: #fff;
    }

    .btn.danger {
      background: var(--red);
      color: #fff;
    }

    .btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .monitor-box {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 14px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbff;
    }

    .monitor-main {
      flex: 1;
      min-width: 0;
    }

    .monitor-title {
      font-weight: 800;
      margin-bottom: 4px;
    }

    .monitor-detail {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .collector-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .collector-empty,
    .collector-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 10px 12px;
    }

    .collector-empty {
      color: var(--muted);
      font-size: 13px;
    }

    .collector-card.offline {
      opacity: .72;
    }

    .collector-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .collector-name {
      min-width: 0;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .collector-pill {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      background: #eef2f7;
    }

    .collector-pill.online {
      color: #047857;
      background: #dff8ed;
    }

    .collector-meta,
    .collector-foot {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }

    .collector-foot {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 4px;
    }

    .collector-bind-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .collector-bind-label {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
    }

    .collector-bind-code {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-weight: 800;
      letter-spacing: 0;
    }

    .collector-bind-row button {
      border: 0;
      border-radius: 6px;
      padding: 7px 10px;
      background: var(--blue);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    .collector-bind-state {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .raw-record-box {
      display: grid;
      grid-template-columns: minmax(180px, 260px) minmax(0, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .raw-record-list {
      display: grid;
      gap: 6px;
      max-height: 220px;
      overflow: auto;
    }

    .raw-record-item {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px 10px;
      color: var(--text);
      cursor: pointer;
    }

    .raw-record-item.active {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .raw-record-main {
      font-weight: 800;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .raw-record-meta {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .raw-record-view {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .raw-record-toolbar {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .raw-record-toolbar button {
      border: 0;
      border-radius: 6px;
      padding: 5px 8px;
      background: #eef2f7;
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
    }

    .raw-record-text {
      min-height: 120px;
      max-height: 220px;
      margin: 0;
      padding: 10px;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: #1f2937;
      font: 12px/1.55 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    .monitor-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-start;
      min-width: 0;
    }

    .monitor-actions .btn {
      flex: 0 0 auto;
    }

    #waybillRawDownload,
    #waybillProcessedDownload {
      flex: 1 1 280px;
      min-width: 220px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--surface-soft);
      padding: 16px;
      min-height: 160px;
      white-space: pre-wrap;
      color: #334155;
      line-height: 1.65;
      overflow-wrap: anywhere;
    }

    .status.ok {
      border-color: #9fd7c2;
      background: #effaf5;
      color: #0f5f48;
    }

    .status.err {
      border-color: #f3b6ad;
      background: #fff4f2;
      color: var(--red);
    }

    .status-title {
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }

    .download-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid #bde1cf;
    }

    .download-name {
      font-weight: 800;
      color: #0f5f48;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .download-link {
      background: var(--green);
      color: #fff;
      border-radius: 8px;
      min-width: 128px;
    }

    .side-list {
      display: grid;
      gap: 10px;
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .info-row:last-child { border-bottom: 0; }

    .info-label { color: var(--muted); }

    .info-value {
      font-weight: 800;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      height: 28px;
      padding: 0 10px;
      border-radius: 8px;
      background: #eef5ff;
      color: var(--blue-dark);
      border: 1px solid #c5dbf5;
      font-size: 13px;
      font-weight: 800;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.5);
      border-top-color: #fff;
      border-radius: 50%;
      display: none;
      animation: spin .8s linear infinite;
    }

    .btn.loading .spinner { display: inline-block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 880px) {
      .shell { padding: 16px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .top-actions { justify-content: flex-start; }
      .layout { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .mode-group { grid-template-columns: 1fr; }
      .file-zone { align-items: stretch; flex-direction: column; }
      .monitor-actions { justify-content: flex-start; }
      .raw-record-box { grid-template-columns: 1fr; }
      .download-box { align-items: stretch; flex-direction: column; }
      .download-link { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">订</div>
        <div>
          <h1>订单整理系统</h1>
          <div id="webversion" class="meta">Web后端版本：读取中</div>
        </div>
      </div>
      <div class="top-actions">
        <span id="systemTag" class="tag">系统读取中</span>
        <button class="btn secondary" type="button" onclick="refreshAll()">刷新状态</button>
      </div>
    </header>

    <section class="stats" aria-label="系统状态">
      <div class="stat">
        <div class="label">鞋款分类</div>
        <div id="categoryCount" class="value">-</div>
      </div>
      <div class="stat">
        <div class="label">鞋款档口</div>
        <div id="stallCount" class="value">-</div>
      </div>
      <div class="stat">
        <div class="label">图片关系</div>
        <div id="imageCount" class="value">-</div>
      </div>
    </section>

    <section class="layout">
      <div class="panel">
        <div class="panel-head">
          <h2 class="panel-title">生成整理文档</h2>
          <span id="templateTag" class="tag">模板读取中</span>
        </div>
        <div class="panel-body">
          <div class="form-grid">
            <div class="field full">
              <label for="files">订单 Excel</label>
              <label class="file-zone" for="files">
                <span class="file-main">
                  <span class="file-title">选择或拖入订单文件</span>
                  <span id="fileDetail" class="file-detail">核心字段：商品简称 / 规格 / 尺码 / 数量 / 备注</span>
                </span>
                <span class="btn secondary">选择文件</span>
              </label>
              <input id="files" class="file-input" type="file" multiple accept=".xlsx,.xls" />
            </div>

            <div class="field full">
              <label>监听打印机面单</label>
              <div class="monitor-box">
                <div class="monitor-main">
                  <div class="monitor-title">业务机采集助手同步本次打印信息原文</div>
                  <div id="waybillDetail" class="monitor-detail">读取业务机监听状态中...</div>
                  <div id="waybillCollectors" class="collector-list" aria-live="polite"></div>
                  <div class="collector-bind-row">
                    <span class="collector-bind-label">业务机绑定码</span>
                    <span class="collector-bind-code" id="collectorBindCode">未生成</span>
                    <span>
                      <button type="button" onclick="createCollectorBindCode()">生成绑定码</button>
                    </span>
                    <span id="collectorBindState" class="collector-bind-state">用于业务机采集助手连接本 Web 后端</span>
                  </div>
                  <div class="raw-record-box">
                    <div id="collectorRawRecords" class="raw-record-list" aria-live="polite"></div>
                    <div class="raw-record-view">
                      <div class="raw-record-toolbar">
                        <span id="collectorRawMeta">打印原文</span>
                        <button type="button" onclick="copyRawRecordText()">复制</button>
                      </div>
                      <pre id="collectorRawText" class="raw-record-text">未采集到原文</pre>
                    </div>
                  </div>
                </div>
                <div class="monitor-actions">
                  <button id="waybillStart" class="btn success" type="button" onclick="startWaybillMonitor()">开始监听</button>
                  <button id="waybillStop" class="btn danger" type="button" onclick="stopWaybillMonitor()" disabled>结束监听并加入待处理</button>
                  <a id="waybillRawDownload" class="btn secondary" href="#" style="display:none;">下载原始文档</a>
                  <a id="waybillProcessedDownload" class="btn secondary" href="#" style="display:none;">下载识别文档</a>
                </div>
              </div>
            </div>

            <div class="field">
              <label for="template">导入模板</label>
              <select id="template">
                <option value="">读取中...</option>
              </select>
            </div>

            <div class="field">
              <label>输出方式</label>
              <div class="mode-group" role="radiogroup" aria-label="输出方式">
                <label class="mode-option">
                  <input type="radio" name="mode" value="合并一个Sheet" />
                  <span>合并Sheet</span>
                </label>
                <label class="mode-option">
                  <input type="radio" name="mode" value="按档口分Sheet" checked />
                  <span>鞋款档口Sheet</span>
                </label>
                <label class="mode-option">
                  <input type="radio" name="mode" value="按档口分文档" />
                  <span>鞋款档口文档</span>
                </label>
              </div>
            </div>
          </div>

          <div class="actions">
            <button id="btn" class="btn primary" type="button" onclick="generate()">
              <span class="spinner"></span>
              <span id="btnText">生成整理文档</span>
            </button>
            <button class="btn secondary" type="button" onclick="openOutput()">服务器本机打开目录</button>
          </div>
        </div>
      </div>

      <aside class="panel">
        <div class="panel-head">
          <h2 class="panel-title">运行状态</h2>
        </div>
        <div class="panel-body">
          <div id="status" class="status">
            <div class="status-title">等待操作</div>
            选择订单 Excel 后即可生成整理文档。
          </div>
          <div class="side-list" style="margin-top:16px;">
            <div class="info-row">
              <span class="info-label">当前系统</span>
              <span id="systemName" class="info-value">-</span>
            </div>
            <div class="info-row">
              <span class="info-label">当前模板</span>
              <span id="activeTemplate" class="info-value">-</span>
            </div>
          </div>
        </div>
      </aside>
    </section>
  </main>

<script>
const filesInput = document.getElementById('files');
const fileDetail = document.getElementById('fileDetail');
const statusEl = document.getElementById('status');
const buttonEl = document.getElementById('btn');
const buttonText = document.getElementById('btnText');
const waybillDetail = document.getElementById('waybillDetail');
const waybillCollectors = document.getElementById('waybillCollectors');
const waybillStart = document.getElementById('waybillStart');
const waybillStop = document.getElementById('waybillStop');
const waybillRawDownload = document.getElementById('waybillRawDownload');
const waybillProcessedDownload = document.getElementById('waybillProcessedDownload');
const collectorBindCode = document.getElementById('collectorBindCode');
const collectorBindState = document.getElementById('collectorBindState');
const collectorRawRecords = document.getElementById('collectorRawRecords');
const collectorRawText = document.getElementById('collectorRawText');
const collectorRawMeta = document.getElementById('collectorRawMeta');
const WAYBILL_RAW_TEMPLATE_NAME = '监控面单-原文模式';
const WAYBILL_PROCESSED_TEMPLATE_NAME = '监控面单-识别结果模式';
let serverFiles = [];
let selectedRawRecordText = '';
let selectedRawRecordId = '';

document.getElementById('template').addEventListener('change', () => {
  syncTemplateLabels();
});

function currentMode() {
  const checked = document.querySelector('input[name="mode"]:checked');
  return checked ? checked.value : '按档口分Sheet';
}

function setStatus(type, title, message) {
  statusEl.className = `status ${type || ''}`.trim();
  statusEl.textContent = '';
  const titleEl = document.createElement('div');
  titleEl.className = 'status-title';
  titleEl.textContent = title;
  statusEl.appendChild(titleEl);
  if (message) {
    statusEl.appendChild(document.createTextNode(message));
  }
}

function setSuccessDownload(title, message, filename, url, label) {
  setStatus('ok', title, message);
  const box = document.createElement('div');
  box.className = 'download-box';

  const name = document.createElement('div');
  name.className = 'download-name';
  name.textContent = filename || '整理文档';

  const link = document.createElement('a');
  link.className = 'btn download-link';
  link.href = url;
  link.textContent = label || '下载';

  box.appendChild(name);
  box.appendChild(link);
  statusEl.appendChild(box);
}

function setLoading(loading) {
  buttonEl.disabled = loading;
  buttonEl.classList.toggle('loading', loading);
  buttonText.textContent = loading ? '正在生成' : '生成整理文档';
}

function updateFileDetail() {
  const files = Array.from(filesInput.files || []);
  if (!files.length) {
    if (!serverFiles.length) {
      fileDetail.textContent = '核心字段：商品简称 / 规格 / 尺码 / 数量 / 备注';
    }
    return;
  }
  serverFiles = [];
  setWaybillDownloads('', '', '', '');
  const totalBytes = files.reduce((sum, file) => sum + file.size, 0);
  const totalText = totalBytes < 1024 * 1024
    ? `${Math.max(1, Math.round(totalBytes / 1024))} KB`
    : `${(totalBytes / 1024 / 1024).toFixed(1)} MB`;
  fileDetail.textContent = `${files.length} 个文件，约 ${totalText}`;
}

function setWaybillButtons(active) {
  waybillStart.disabled = active;
  waybillStop.disabled = !active;
}

function setWaybillText(text) {
  waybillDetail.textContent = text;
}

function setDownloadLink(link, path, filename, fallbackLabel) {
  if (!path) {
    link.style.display = 'none';
    link.removeAttribute('href');
    return;
  }
  link.href = `/api/download?path=${encodeURIComponent(path)}`;
  link.textContent = filename ? `下载 ${filename}` : fallbackLabel;
  link.style.display = '';
}

function setWaybillDownloads(rawPath, rawFilename, processedPath, processedFilename) {
  setDownloadLink(waybillRawDownload, rawPath, rawFilename, '下载原始文档');
  setDownloadLink(waybillProcessedDownload, processedPath, processedFilename, '下载识别文档');
}

function selectedTemplateName() {
  const sel = document.getElementById('template');
  return sel ? (sel.value || '') : '';
}

function syncTemplateLabels(name) {
  const value = name || selectedTemplateName() || '-';
  document.getElementById('templateTag').textContent = value === '-' ? '已加载模板' : value;
  document.getElementById('activeTemplate').textContent = value;
}

function appendText(parent, className, text, tagName = 'div') {
  const node = document.createElement(tagName);
  node.className = className;
  node.textContent = text;
  parent.appendChild(node);
  return node;
}

async function createCollectorBindCode() {
  try {
    const r = await fetch('/api/collector/bind-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json; charset=utf-8' },
      body: JSON.stringify({ created_by: 'web' })
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || '绑定码生成失败');
    collectorBindCode.textContent = d.bind_code || '-';
    collectorBindState.textContent = d.expires_at ? `有效期至 ${d.expires_at}` : '已生成';
    setStatus('ok', '业务机绑定码已生成', `在业务机采集助手中输入绑定码：${d.bind_code || '-'}`);
  } catch (e) {
    setStatus('err', '绑定码生成失败', e.message);
  }
}

function rawRecordTitle(row) {
  const source = row.machine_label || row.collector_id || '采集记录';
  const rowid = row.component_rowid ? `rowid ${row.component_rowid}` : '未记录 rowid';
  return `${source} / ${rowid}`;
}

function renderRawRecords(records) {
  collectorRawRecords.textContent = '';
  if (!records.length) {
    appendText(collectorRawRecords, 'collector-empty', '暂无采集原文');
    collectorRawText.textContent = '未采集到原文';
    collectorRawMeta.textContent = '打印原文';
    selectedRawRecordText = '';
    selectedRawRecordId = '';
    return;
  }
  const activeId = records.some((row) => row.record_id === selectedRawRecordId)
    ? selectedRawRecordId
    : (records[0].record_id || '');
  records.forEach((row, index) => {
    const item = document.createElement('button');
    item.type = 'button';
    item.className = `raw-record-item ${row.record_id === activeId ? 'active' : ''}`.trim();
    item.dataset.recordId = row.record_id || '';
    appendText(item, 'raw-record-main', rawRecordTitle(row));
    appendText(item, 'raw-record-meta', `${row.extract_status || '-'} · task ${row.task_id || '-'} · ${row.created_at || ''}`);
    item.addEventListener('click', () => loadRawRecordDetail(row.record_id, item));
    collectorRawRecords.appendChild(item);
  });
  const activeItem = Array.from(collectorRawRecords.querySelectorAll('.raw-record-item'))
    .find((node) => node.dataset.recordId === activeId);
  loadRawRecordDetail(activeId, activeItem);
}

async function loadRawRecordDetail(recordId, item) {
  if (!recordId) return;
  try {
    const r = await fetch(`/api/collector/records/${encodeURIComponent(recordId)}`, { cache: 'no-store' });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || '原文读取失败');
    const record = d.record || {};
    selectedRawRecordId = record.record_id || recordId;
    selectedRawRecordText = [
      record.print_text_raw || '未采集到打印文字',
      record.raw_msg_json ? `\n\nraw_msg_json:\n${record.raw_msg_json}` : '',
      record.raw_document_json ? `\n\nraw_document_json:\n${record.raw_document_json}` : ''
    ].join('');
    collectorRawText.textContent = selectedRawRecordText || '未采集到原文';
    collectorRawMeta.textContent = `${record.extract_status || '-'} · rowid ${record.component_rowid || '-'} · ${record.raw_length || 0} 字`;
    collectorRawRecords.querySelectorAll('.raw-record-item').forEach((node) => node.classList.remove('active'));
    if (item) item.classList.add('active');
  } catch (e) {
    collectorRawText.textContent = e.message;
    collectorRawMeta.textContent = '原文读取失败';
    selectedRawRecordText = '';
  }
}

async function copyRawRecordText() {
  if (!selectedRawRecordText) {
    setStatus('err', '没有可复制的打印原文', '当前记录未采集到原文。');
    return;
  }
  try {
    await navigator.clipboard.writeText(selectedRawRecordText);
    setStatus('ok', '打印原文已复制', '');
  } catch (e) {
    setStatus('err', '复制失败', e.message);
  }
}

function collectorComponentText(row) {
  const components = Array.isArray(row.components) ? row.components : [];
  const total = Number(row.component_count || components.length || 0);
  const available = Number(row.available_components || components.filter(item => item && item.exists).length || 0);
  return total ? `组件 ${available}/${total}` : '组件未上报';
}

function collectorUploadText(row) {
  const records = Number(row.uploaded_records || row.last_upload_count || 0);
  if (!records) return '未回传';
  return `最近回传 ${records} 条`;
}

function renderWaybillCollectors(collectors) {
  waybillCollectors.textContent = '';
  if (!collectors.length) {
    appendText(waybillCollectors, 'collector-empty', '暂无业务机连接。业务机采集助手连上服务器后，会自动新增到这里。');
    return;
  }

  collectors.forEach((row) => {
    const card = document.createElement('div');
    card.className = `collector-card ${row.online ? 'online' : 'offline'}`.trim();

    const head = document.createElement('div');
    head.className = 'collector-head';
    appendText(head, 'collector-name', row.machine_label || row.machine_name || row.client_id || '未命名业务机');
    appendText(head, `collector-pill ${row.online ? 'online' : ''}`.trim(), row.online ? '在线' : '离线', 'span');
    card.appendChild(head);

    const identity = row.hostname || row.machine_name || row.client_id || '-';
    appendText(card, 'collector-meta', identity);
    appendText(
      card,
      'collector-meta',
      `agent ${row.agent_version || '-'} / protocol ${row.protocol_version || '-'}${row.upgrade_required ? ' / 需要升级' : ''}`
    );

    const foot = document.createElement('div');
    foot.className = 'collector-foot';
    appendText(foot, 'collector-meta', collectorComponentText(row), 'span');
    appendText(foot, 'collector-meta', collectorUploadText(row), 'span');
    card.appendChild(foot);

    waybillCollectors.appendChild(card);
  });
}

function selectTemplate(name) {
  const sel = document.getElementById('template');
  if ([...sel.options].some((opt) => opt.value === name)) {
    sel.value = name;
    syncTemplateLabels(name);
  }
}

async function refreshWaybillStatus() {
  try {
    const r = await fetch('/api/waybill/status', { cache: 'no-store' });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || '读取失败');
    setWaybillButtons(!!d.active);
    renderRawRecords(d.raw_records || []);
    const collectors = d.collectors || [];
    renderWaybillCollectors(collectors);
    setWaybillDownloads(
      d.last_raw_file || '',
      d.last_raw_filename || '',
      d.last_processed_file || '',
      d.last_processed_filename || ''
    );
    const totalCollectors = d.collector_count || collectors.length || 0;
    const onlineCollectors = d.online_collectors || collectors.filter(row => row.online).length || 0;
    const collectorText = totalCollectors ? `已连接 ${totalCollectors} 台，在线 ${onlineCollectors} 台` : '暂无业务机连接';
    const uploadedText = d.uploaded_collectors ? `，已回传 ${d.uploaded_collectors} 台` : '';
    if (d.active) {
      selectTemplate(d.template_name || WAYBILL_RAW_TEMPLATE_NAME);
      setWaybillText(`监听中，批次 ${d.batch_id || '-'}，${collectorText}${uploadedText}，本次新面单 ${d.session_records || 0} 条`);
    } else if (d.last_raw_file || d.last_processed_file) {
      const loadedCurrentFile = d.last_processed_file && serverFiles.includes(d.last_processed_file);
      setWaybillText(
        loadedCurrentFile
          ? `本次监听已识别 ${d.last_processed_count || 0} 条。${collectorText}`
          : `未启动。${collectorText}。有历史原始/识别文件可下载（原始 ${d.last_raw_count || 0} 条，识别 ${d.last_processed_count || 0} 条），不会自动参与本次生成`
      );
    } else {
      setWaybillText(`未启动。${collectorText}。点击开始后由业务机采集助手记录本机打印基准`);
    }
  } catch (e) {
    setWaybillButtons(false);
    renderWaybillCollectors([]);
    renderRawRecords([]);
    setWaybillText(`监听状态读取失败：${e.message}`);
    setWaybillDownloads('', '', '', '');
  }
}

async function startWaybillMonitor() {
  try {
    const r = await fetch('/api/waybill/start', { method: 'POST', cache: 'no-store' });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || '启动失败');
    serverFiles = [];
    filesInput.value = '';
    selectTemplate(d.template_name || WAYBILL_RAW_TEMPLATE_NAME);
    fileDetail.textContent = `打印机监听中，本次从 ${d.started_at || '现在'} 开始统计`;
    setWaybillButtons(true);
    setWaybillDownloads('', '', '', '');
    renderWaybillCollectors(d.collectors || []);
    setWaybillText(`监听中，批次 ${d.batch_id || '-'}。已连接的业务机会各自记录本机基准。`);
    setStatus('ok', '打印机监听已启动', '现在让已连接的业务机正常打印面单；打印完成后点击“结束监听并加入待处理”。');
  } catch (e) {
    setStatus('err', '打印机监听启动失败', e.message);
  }
}

async function stopWaybillMonitor() {
  try {
    const r = await fetch('/api/waybill/stop', { method: 'POST', cache: 'no-store' });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || '结束失败');
    setWaybillButtons(false);
    renderWaybillCollectors(d.collectors || []);

    if (!d.raw_file && !d.processed_file) {
      serverFiles = [];
      fileDetail.textContent = '本次监听没有新面单';
      setWaybillDownloads('', '', '', '');
      setStatus('ok', '监听已结束', '本次没有业务机回传新面单。');
      return;
    }

    serverFiles = d.processed_file ? [d.processed_file] : [d.raw_file];
    filesInput.value = '';
    selectTemplate(d.processed_template_name || WAYBILL_PROCESSED_TEMPLATE_NAME);
    fileDetail.textContent = `已加入识别结果：${d.processed_filename || d.processed_file || d.raw_filename || d.raw_file}（识别 ${d.processed_records || 0} 条）`;
    setWaybillDownloads(d.raw_file || '', d.raw_filename || '', d.processed_file || '', d.processed_filename || '');

    setSuccessDownload(
      '识别结果已加入',
      `原始文档：${d.raw_filename || d.raw_file || '-'}\n识别文档：${d.processed_filename || d.processed_file || '-'}\n已自动加入识别后的文档；现在可以点击“生成整理文档”。`,
      d.processed_filename || d.raw_filename || '监控面单识别.xlsx',
      `/api/download?path=${encodeURIComponent(d.processed_file || d.raw_file)}`,
      '下载识别文档'
    );
  } catch (e) {
    setStatus('err', '打印机监听结束失败', e.message);
  } finally {
    refreshWaybillStatus();
  }
}

async function loadTemplates() {
  const sel = document.getElementById('template');
  try {
    const r = await fetch('/api/templates', { cache: 'no-store' });
    const d = await r.json();
    sel.innerHTML = '';

    if (!d.ok || !d.templates || !d.templates.length) {
      sel.innerHTML = '<option value="">未配置模板</option>';
      document.getElementById('templateTag').textContent = '未配置模板';
      return;
    }

    for (const t of d.templates) {
      const opt = document.createElement('option');
      opt.value = t.name;
      opt.textContent = `${t.name}${t.mode ? '（' + t.mode + '）' : ''}`;
      sel.appendChild(opt);
    }

    if (serverFiles.length) {
      selectTemplate(WAYBILL_PROCESSED_TEMPLATE_NAME);
    } else if (d.active_template) {
      sel.value = d.active_template;
      syncTemplateLabels(sel.value);
    }
    syncTemplateLabels(sel.value);
  } catch (e) {
    sel.innerHTML = '<option value="">模板读取失败</option>';
    document.getElementById('templateTag').textContent = '模板读取失败';
  }
}

async function refreshStatus() {
  try {
    const r = await fetch('/api/status', { cache: 'no-store' });
    const d = await r.json();
    document.getElementById('systemName').textContent = d.system_name || '-';
    document.getElementById('systemTag').textContent = d.system_name || '未配置系统';
    document.getElementById('activeTemplate').textContent = selectedTemplateName() || d.active_template || '-';
    document.getElementById('webversion').textContent = `Web后端版本：${d.web_version || '未返回版本号'}`;
    document.getElementById('categoryCount').textContent = d.category_rules ?? 0;
    document.getElementById('stallCount').textContent = d.stall_rules ?? 0;
    document.getElementById('imageCount').textContent = d.image_rules ?? 0;
  } catch(e) {
    setStatus('err', '状态读取失败', '请确认 Web 服务正在运行。');
  }
}

async function refreshAll() {
  await loadTemplates();
  await Promise.all([refreshStatus(), refreshWaybillStatus()]);
}

async function generate() {
  const files = filesInput.files;
  const template = document.getElementById('template').value;

  if (!files.length && !serverFiles.length) {
    setStatus('err', '缺少订单文件', '请先选择订单 Excel，或先用“监听打印机面单”导入本次面单。');
    return;
  }

  if (!template) {
    setStatus('err', '缺少导入模板', '请先选择导入模板。');
    return;
  }

  const fd = new FormData();
  for (const f of files) fd.append('files', f);
  if (serverFiles.length) fd.append('server_files', JSON.stringify(serverFiles));
  fd.append('output_mode', currentMode());
  fd.append('template_name', template);

  setLoading(true);
  setStatus('', '正在生成', '文件较多或包含图片时会多等一会儿。');

  try {
    const r = await fetch('/api/generate', { method:'POST', body: fd });
    const d = await r.json();
    if (!d.ok) {
      const detail = [
        d.error || '生成失败',
        'Web后端版本：' + (d.web_version || '未返回版本号'),
        '',
        '定位信息：',
        JSON.stringify(d.debug || {}, null, 2),
        '',
        d.traceback || ''
      ].join('\n');
      throw new Error(detail);
    }

    const downloadPath = d.download_path || d.path;
    const downloadUrl = `/api/download?path=${encodeURIComponent(downloadPath)}`;
    const title = d.is_dir ? '鞋款档口文档已打包' : '整理文档已生成';
    const message = d.is_dir
      ? `输出文件夹：${d.filename}\n全部鞋款档口文档已打包为压缩包。`
      : `输出文件：${d.filename}`;
    const label = d.is_dir ? '下载压缩包' : '下载文档';
    setSuccessDownload(title, message, d.download_filename || d.filename, downloadUrl, label);
  } catch(e) {
    setStatus('err', '生成失败', e.message);
  } finally {
    setLoading(false);
  }
}

async function openOutput() {
  await fetch('/api/open-output');
}

filesInput.addEventListener('change', updateFileDetail);
document.getElementById('template').addEventListener('change', (event) => {
  document.getElementById('templateTag').textContent = event.target.value || '未选择模板';
});

refreshAll();
</script>
